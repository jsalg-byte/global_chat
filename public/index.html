<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseRooms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="connection-status" class="connection-status" role="status" aria-live="polite" hidden></div>

    <main>
      <section id="claim-screen" class="claim-screen" aria-labelledby="claim-title">
        <div class="claim-card">
          <p class="eyebrow">Realtime Public Chat</p>
          <h1 id="claim-title">Claim your username</h1>
          <p class="hint">No password. Your browser token is your identity.</p>
          <form id="claim-form" novalidate>
            <label for="claim-username">Username</label>
            <input
              id="claim-username"
              name="username"
              autocomplete="off"
              minlength="3"
              maxlength="24"
              pattern="[A-Za-z0-9_]{3,24}"
              required
              placeholder="e.g. chat_ace"
            />
            <button type="submit" id="claim-submit">Claim</button>
          </form>
          <p id="claim-error" class="form-error" role="alert"></p>
        </div>
      </section>

      <section id="app-screen" class="app-screen" hidden>
        <header class="app-header">
          <div class="brand">
            <div class="brand-dot" aria-hidden="true"></div>
            <h2>PulseRooms</h2>
          </div>
          <div class="session-controls">
            <p id="current-username" class="username"></p>
            <button id="release-username" class="secondary-btn" type="button">Release Username</button>
          </div>
        </header>

        <div class="layout">
          <aside class="sidebar" aria-label="Channel list">
            <div class="sidebar-head">
              <h3>Channels</h3>
              <button id="toggle-create-channel" type="button">+ New Room</button>
            </div>

            <form id="create-channel-form" class="create-channel-form" hidden>
              <label for="channel-name">Channel name</label>
              <input id="channel-name" name="name" maxlength="60" placeholder="#general" required />
              <label for="channel-description">Description (optional)</label>
              <input id="channel-description" name="description" maxlength="120" placeholder="What is this room for?" />
              <div class="create-actions">
                <button type="submit">Create</button>
                <button id="cancel-create-channel" type="button" class="secondary-btn">Cancel</button>
              </div>
              <p id="create-channel-error" class="form-error" role="alert"></p>
            </form>

            <nav id="channel-list" class="channel-list" aria-label="Public channels"></nav>
          </aside>

          <section class="chat-pane" aria-label="Chat pane">
            <div class="chat-head">
              <div>
                <h3 id="active-channel-name">#general</h3>
                <p id="active-channel-description" class="channel-description"></p>
              </div>
              <p id="active-online" class="online-pill">0 online</p>
            </div>

            <div id="message-list" class="message-list" role="log" aria-live="polite" aria-relevant="additions"></div>

            <button id="new-message-nudge" class="new-message-nudge" hidden type="button">↓ new messages</button>

            <p id="typing-indicator" class="typing-indicator" aria-live="polite"></p>

            <form id="message-form" class="message-form">
              <label class="sr-only" for="message-input">Type a message</label>
              <textarea
                id="message-input"
                rows="2"
                placeholder="Say something..."
                required
              ></textarea>
              <div class="message-actions">
                <p id="message-count" class="message-count">0 / 2000</p>
                <button id="send-message" type="submit">Send</button>
              </div>
            </form>

            <div id="live-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
